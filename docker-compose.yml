services:
  postgres:
    image: postgres:16
    container_name: nba-stats-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nba_stats
    ports:
      - "5433:5432"
    volumes:
      - nba-stats-data:/var/lib/postgresql/data

volumes:
  nba-stats-data:

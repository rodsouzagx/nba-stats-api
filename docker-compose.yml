services:
  postgres:
    image: postgres:16
    container_name: nba-stats-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nba_stats
    ports:
      - "5433:5432"
    volumes:
      - nba-stats-data:/var/lib/postgresql/data
  api:
    build: .
    container_name: nba-stats-api
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nba_stats
    depends_on:
      - postgres
volumes:
  nba-stats-data:
